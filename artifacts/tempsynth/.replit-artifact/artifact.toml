kind = "web"
previewPath = "/"
title = "TempSynth Agentic AI"
version = "1.0.0"
id = "artifacts/tempsynth"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21427

[services.development]
run = "pnpm --filter @workspace/tempsynth run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tempsynth", "run", "build" ]
publicDir = "artifacts/tempsynth/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21427"
BASE_PATH = "/"
